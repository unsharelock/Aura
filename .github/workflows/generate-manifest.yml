name: Generate Music Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'music/**'        # Only runs when music files change
      - 'generate-manifest.js'

  workflow_dispatch:       # Also allows manual trigger from GitHub UI

jobs:
  generate-manifest:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate manifest.json
        run: node generate-manifest.js

      - name: Commit and push manifest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add music/manifest.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update music manifest [skip ci]"
          git push
