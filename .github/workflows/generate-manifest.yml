name: Build & Deploy Aura

on:
  push:
    branches:
      - main
  workflow_dispatch:     # Manual trigger from GitHub UI

permissions:
  contents: write       # To commit updated manifest.json
  pages: write          # To deploy to GitHub Pages
  id-token: write       # Required by deploy-pages action

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate music/manifest.json
        run: node generate-manifest.js

      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add music/manifest.json
          git diff --staged --quiet || git commit -m "chore: update music manifest"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'     # Upload everything (including the freshly generated manifest)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
